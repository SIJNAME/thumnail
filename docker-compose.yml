version: "3.9"
services:
  api:
    build: .
    env_file: .env
    ports:
      - "9000:9000"
    depends_on:
      - redis
    command: node dist/server.js

  worker:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: node dist/workers/index.js

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
